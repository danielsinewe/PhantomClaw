<html>
  <body>
    <div>Posts</div>
    <div>Latest</div>
    <div>Photo</div>
    <div>Keyword opportunities</div>
    <div>Organization filter Example Company</div>
    <div data-actor-name="Example Company">Acting as Example Company</div>

    <article data-post-id="urn:li:activity:1001" data-post-url="https://www.linkedin.com/feed/update/urn:li:activity:1001" data-comments-expanded="true">
      <p>Post one about new opportunities.</p>
      <button data-post-like-selector="[data-post-id='urn:li:activity:1001'] .like">Like</button>
      <button data-comment-toggle-selector="[data-post-id='urn:li:activity:1001'] .comments">Comments</button>
      <div data-comment-id="comment-1">
        <span>Great thread</span>
        <button data-comment-like-selector="[data-comment-id='comment-1'] .like">Like</button>
      </div>
      <div data-comment-id="comment-2" data-parent-comment-id="comment-1">
        <span>Nested reply</span>
        <button data-comment-like-selector="[data-comment-id='comment-2'] .like">Like</button>
      </div>
    </article>

    <article data-post-id="urn:li:activity:1002" data-post-url="https://www.linkedin.com/feed/update/urn:li:activity:1002">
      <p>Second post.</p>
      <button data-post-like-selector="[data-post-id='urn:li:activity:1002'] .like">Like</button>
      <button data-comment-toggle-selector="[data-post-id='urn:li:activity:1002'] .comments">Comments</button>
      <button data-reply-toggle-selector="[data-post-id='urn:li:activity:1002'] .replies">Replies</button>
    </article>
  </body>
</html>
