name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg[binary]>=3.3.3"

      - name: Run unit tests
        run: python -m unittest

      - name: Export contract bundle fixture
        run: |
          python scripts/export_run_bundle.py \
            --automation-name linkedin-company-profile-engagement \
            --report-path tests/fixtures/company_profile_report.json \
            --output /tmp/phantomclaw-contract-bundle.json
          test -s /tmp/phantomclaw-contract-bundle.json

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
